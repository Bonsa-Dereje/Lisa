<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISA - Community Art Exhibition</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-brand">LISA</div>
            <div class="nav-links" id="navLinks">
                <a href="#" data-page="home" class="active">Home</a>
                <a href="#" data-page="exhibition">Exhibition</a>
                <a href="#" data-page="about">About</a>
            </div>
            <div class="nav-auth" id="navAuth">
                <button class="btn btn-outline" id="loginBtn">Log In</button>
                <button class="btn btn-primary" id="registerBtn">Sign Up</button>
            </div>
            <div class="nav-user" id="navUser" style="display:none;">
                <span id="userNameDisplay"></span>
                <button class="btn btn-outline" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="mainContent">
        <!-- Pages will be loaded here -->
    </main>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close" id="closeLogin">&times;</span>
            <h2>Welcome Back</h2>
            <p class="modal-subtitle">Sign in to continue exploring art</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                <p class="form-footer">Don't have an account? <a href="#" id="switchToRegister">Sign Up</a></p>
            </form>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <span class="close" id="closeRegister">&times;</span>
            <h2>Create Account</h2>
            <p class="modal-subtitle">Join the LISA community</p>
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerName">Full Name</label>
                    <input type="text" id="registerName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email Address</label>
                    <input type="email" id="registerEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="registerRole">Role</label>
                    <select id="registerRole">
                        <option value="user">Art Lover</option>
                        <option value="presenter">Artist / Presenter</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                <p class="form-footer">Already have an account? <a href="#" id="switchToLogin">Sign In</a></p>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/user.js"></script>
    <script src="js/pages/presenter.js"></script>
    <script src="js/pages/admin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
